name: CI

on:
  push:
    branches:
      - develop
      - stage
      - main
    paths:
      - "assets/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

  pull_request:
    branches:
      - develop
      - stage
      - main
    paths:
      - "assets/**"
      - "packages/**"
      - "scripts/**"
      - "docker/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm generate

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm lint

  docker:
    name: Docker Verify
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t nava-icon:verify .

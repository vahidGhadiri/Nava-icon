name: CI/CD

on:
  pull_request:
    branches:
      - develop
      - stage
      - main
    paths:
      - "assets/**"
      - "packages/**"
      - "scripts/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "packages/**"
      - "scripts/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.event.pull_request.base.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    environment:
      name: ${{ github.base_ref == 'main' && 'PRODUCTION' || github.base_ref == 'stage' && 'STAGING' || 'DEV' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker:
    name: Build Docker Image

    needs: verify

    if: |
      github.event_name == 'pull_request' &&
      (
        (
          github.base_ref == 'stage' &&
          startsWith(github.head_ref, 'release/stage')
        )
        ||
        (
          github.base_ref == 'main' &&
          startsWith(github.head_ref, 'release/prod')
        )
      )

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    environment:
      name: ${{ github.base_ref == 'main' && 'PRODUCTION' || 'STAGING' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nava-icons
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile

          # فقط validate build
          # push بعد از merge/deploy انجام شود
          push: false

          tags: ${{ steps.meta.outputs.tags }}

          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish packages to npm

    if: |
      github.event_name == 'push' &&
      github.ref_name == 'main'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    environment:
      name: PRODUCTION

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm generate

      - name: Build
        run: pnpm build

      - name: Create Release PR or Publish
        uses: changesets/action@v1

        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          version: pnpm changeset version
          publish: pnpm publish:ci
          createGithubReleases: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
